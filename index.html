                              <table className='w-full whitespace-nowrap text-sm text-left border-collapse'>
                                <thead className='text-xs text-slate-500 dark:text-slate-400 uppercase bg-slate-100 dark:bg-slate-900 sticky top-0 z-30 font-extrabold'>
                                  <tr>
                                    <th className="px-5 py-4 border-b border-r border-slate-200 dark:border-slate-700 w-1/3 min-w-[200px] sticky left-0 z-40 bg-slate-100 dark:bg-slate-900 shadow-[1px_0_0_0_#e2e8f0] dark:shadow-[1px_0_0_0_#334155]">Mata Pelajaran</th>
                                    {availableSemesters.map(sem => (
                                       <th key={sem} className="px-4 py-4 border-b border-r border-slate-200 dark:border-slate-700 text-center">Smstr {sem}</th>
                                    ))}
                                    <th className="px-4 py-4 border-b border-slate-200 dark:border-slate-700 text-center bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400">Rerata Mapel</th>
                                  </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 dark:divide-slate-800/50 bg-white dark:bg-slate-800">
                                  {uniqueSubjects.map(subj => {
                                     const rerataColName = 'Rerata_' + subj;
                                     const mapelInfo = mapelConfig.find(m => m.subject.toLowerCase() === subj.toLowerCase());
                                     const isWajib = mapelInfo && mapelInfo.isIjazah;
                                     const isToleransi = mapelInfo && mapelInfo.isToleransi;

                                     return (
                                      <tr key={subj} className="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group">
                                        <td className="px-5 py-3.5 font-bold text-slate-700 dark:text-slate-200 border-r border-slate-100 dark:border-slate-700/50 whitespace-normal sticky left-0 z-20 bg-white dark:bg-slate-800 group-hover:bg-slate-50 dark:group-hover:bg-slate-700/30 shadow-[1px_0_0_0_#f1f5f9] dark:shadow-[1px_0_0_0_#1e293b]">
                                           <div className="flex flex-col">
                                              <span>{getMapelAlias(subj)}</span>
                                              <span className={"text-[10px] mt-0.5 " + (isWajib ? "text-amber-600 dark:text-amber-400" : "text-slate-400")}>
                                                  {isWajib ? 'Masuk Ijazah (Wajib)' : 'Muatan Sekolah (Non-Wajib)'}
                                                  {isToleransi && <span className="ml-1 text-purple-500 font-bold" title="Mapel ini tidak dicek kelengkapannya"><i className="fas fa-shield-alt"></i> Ditoleransi</span>}
                                              </span>
                                           </div>
                                        </td>
                                        {availableSemesters.map(sem => {
                                           const colName = 'Sem' + sem + '_' + subj;
                                           const val = studentData[colName] !== undefined ? studentData[colName] : '';
                                           
                                           if (!headers.includes(colName)) return <td key={sem} className="px-4 py-3 border-r border-slate-100 dark:border-slate-700/50 text-center font-black text-slate-200 dark:text-slate-700 bg-slate-50/50 dark:bg-slate-900/30 cursor-not-allowed">-</td>;

                                           const isLockedForUser = lockStatus[studentData.Rombel] || studentData['Verifikasi Siswa'] === 'Selesai' || studentData['Verifikasi Wali'] === 'Selesai';
                                           const pendingDraft = drafts.find(d => String(d.NIS) === String(selectedStudentNIS) && d['Kolom Mapel'] === colName && d.Status === 'Pending');
                                           const isPending = !!pendingDraft;
                                           const pendingValue = isPending ? pendingDraft['Nilai Baru'] : '';

                                           return (
                                             <td key={sem} className="px-4 py-2 sm:py-2.5 border-r border-slate-100 dark:border-slate-700/50 text-center">
                                                <EditableCell 
                                                   value={val} 
                                                   isPending={isPending} 
                                                   pendingValue={pendingValue}
                                                   isEditedByWali={waliEdits.includes(selectedStudentNIS + '_' + colName)}
                                                   loadingStatus={cellLoading[selectedStudentNIS + '_' + colName]} 
                                                   isLocked={isLockedForUser} 
                                                   onSave={(newVal) => saveCellData(selectedStudentNIS, colName, val, newVal)} 
                                                />
                                             </td>
                                           )
                                        })}
                                        <td className="px-4 py-3 text-center font-black text-emerald-600 dark:text-emerald-400 bg-emerald-50/30 dark:bg-emerald-900/10 text-base">
                                           {studentData[rerataColName] || '-'}
                                        </td>
                                      </tr>
                                    )
                                  })}
                                </tbody>
                              </table>
                           )}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* TAB: TABEL MASTER (WALI KELAS & ADMIN) */}
                {tab === 'editor' && auth.role !== 'Siswa' && (
                  <div className='p-4 sm:p-6 flex flex-col h-full flex-1 overflow-auto'>
                    <div className='flex flex-col lg:flex-row justify-between items-start lg:items-center mb-4 sm:mb-5 gap-4 shrink-0'>
                      <div className="w-full lg:w-auto">
                        <h2 className='text-lg sm:text-xl lg:text-2xl font-extrabold text-slate-800 dark:text-white'>Tabel Master & Validasi Final</h2>
                        <p className='text-xs sm:text-sm text-slate-500 dark:text-slate-400 mt-1 flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3'>
                           <span>Pantau seluruh Rerata Ijazah dan Validasi data siswa yang sudah diverifikasi (Lengkap).</span>
                           <span className="inline-flex items-center text-blue-500 bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded border border-blue-100 dark:border-blue-800"><i className="fas fa-user-edit text-[10px] mr-1.5"></i> Edit Mandiri Wali Kelas</span>
                        </p>
                      </div>
                      
                      <div className='flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full lg:w-auto'>
                        <div className="relative w-full sm:w-56 lg:w-64">
                           <i className="fas fa-search absolute left-3.5 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                           <input type="text" placeholder="Cari NIS / Nama..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="pl-10 pr-4 py-2 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-medium transition-all"/>
                        </div>
                        <div className='flex items-center bg-slate-50 dark:bg-slate-900 p-1 rounded-xl border border-slate-200 dark:border-slate-700 w-full sm:w-auto shrink-0'>
                          <div className="bg-white dark:bg-slate-800 p-1.5 px-3 rounded-lg text-slate-400 hidden sm:block shadow-sm"><i className='fas fa-filter'></i></div>
                          <select className='bg-transparent font-bold px-3 py-1.5 w-full sm:w-40 focus:outline-none text-slate-800 dark:text-slate-200 text-sm sm:text-base' value={selectedRombel} onChange={e => setSelectedRombel(e.target.value)} disabled={auth.role === 'Wali Kelas' && auth.rombelAkses !== 'Semua'}>{auth.role === 'Admin' || auth.rombelAkses === 'Semua' ? <option value="Semua">Semua Rombel</option> : null}{rombels.map(r => <option key={r} value={r} className="dark:bg-slate-800">Kelas {r}</option>)}</select>
                        </div>
                      </div>
                    </div>

                    {loading ? <div className="flex-1 flex items-center justify-center py-20"><i className="fas fa-circle-notch fa-spin text-4xl text-blue-500"></i></div> : (
                      <div className='flex-1 flex flex-col min-h-0 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm bg-white dark:bg-slate-800 relative'>
                        <div className='flex-1 overflow-auto table-container relative'>
                           <table className='w-full whitespace-nowrap text-sm text-left border-collapse'>
                             <thead className='text-xs text-slate-500 dark:text-slate-400 uppercase sticky top-0 z-40 font-extrabold shadow-sm'>
                               <tr>
                                 {headers.map(h => {
                                   let baseClass = 'px-4 py-3 sm:py-4 border-b border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-900';
                                   if (h === 'NIS') return <th key={h} className={baseClass + ' md:sticky md:left-0 z-50 border-r w-[80px] min-w-[80px] shadow-[1px_0_0_0_#e2e8f0] dark:shadow-[1px_0_0_0_#334155]'}>{h}</th>;
                                   if (h === 'NISN') return <th key={h} className={baseClass + ' md:sticky md:left-[80px] z-50 border-r w-[100px] min-w-[100px] shadow-[1px_0_0_0_#e2e8f0] dark:shadow-[1px_0_0_0_#334155]'}>{h}</th>;
                                   if (h === 'Nama Lengkap') return <th key={h} className={baseClass + ' md:sticky md:left-[180px] z-50 border-r w-[200px] min-w-[200px] shadow-[1px_0_0_0_#e2e8f0] dark:shadow-[1px_0_0_0_#334155]'}>{h}</th>;
                                   return <th key={h} className={baseClass + (h.includes('Verifikasi') || h.includes('Status') ? ' text-center' : '')}>{formatHeaderDisplay(h, false)}</th>;
                                 })}
                                 {auth.role === 'Admin' && <th className="px-4 py-3 sm:py-4 border-b border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-900 text-center text-red-500">Aksi</th>}
                               </tr>
                             </thead>
                             <tbody className="divide-y divide-slate-100 dark:divide-slate-800/50">
                               {currentData.length === 0 ? <tr><td colSpan={headers.length + (auth.role === 'Admin' ? 1 : 0)} className="text-center py-12 text-slate-400 bg-white dark:bg-slate-800">Tidak ada data ditemukan.</td></tr> : null}
                               {currentData.map((row) => {
                                 const needsWaliAction = auth.role === 'Wali Kelas' && row['Verifikasi Siswa'] === 'Selesai' && row['Status Data'] === 'Lengkap' && row['Verifikasi Wali'] !== 'Selesai';
                                 const rowBgClass = needsWaliAction ? "bg-emerald-50/50 dark:bg-emerald-900/10" : "bg-white dark:bg-slate-800";
                                 
                                 return (
                                 <tr key={row.NIS} className={rowBgClass + " hover:bg-slate-50 dark:hover:bg-slate-700/50 group transition-colors " + (needsWaliAction ? 'border-l-4 border-emerald-400 dark:border-emerald-600' : '')}>
                                   {headers.map(h => {
                                     const isEditable = h.startsWith('Sem');
                                     const isRerataMapel = h.startsWith('Rerata_') && !h.includes('Akhir');
                                     const isLockedForUser = lockStatus[row.Rombel] || row['Verifikasi Wali'] === 'Selesai';
                                     const pendingDraft = drafts.find(d => String(d.NIS) === String(row.NIS) && d['Kolom Mapel'] === h && d.Status === 'Pending');
                                     const isPending = !!pendingDraft;
                                     const pendingValue = isPending ? pendingDraft['Nilai Baru'] : '';
                                     
                                     let baseClass = 'px-4 py-2 sm:py-2.5 border-r border-slate-100 dark:border-slate-700/50';
                                     
                                     if (h === 'NIS') return <td key={h} className={baseClass + " md:sticky md:left-0 z-30 " + rowBgClass + " group-hover:bg-slate-50 dark:group-hover:bg-slate-700/50 font-mono text-slate-500 shadow-[1px_0_0_0_#f1f5f9] dark:shadow-[1px_0_0_0_#334155]"}>{row[h]}</td>;
                                     if (h === 'NISN') return <td key={h} className={baseClass + " md:sticky md:left-[80px] z-30 " + rowBgClass + " group-hover:bg-slate-50 dark:group-hover:bg-slate-700/50 font-mono text-slate-500 shadow-[1px_0_0_0_#f1f5f9] dark:shadow-[1px_0_0_0_#334155]"}>{row[h]}</td>;
                                     if (h === 'Nama Lengkap') return <td key={h} className={baseClass + " md:sticky md:left-[180px] z-30 " + rowBgClass + " group-hover:bg-slate-50 dark:group-hover:bg-slate-700/50 font-bold text-slate-800 dark:text-white shadow-[1px_0_0_0_#f1f5f9] dark:shadow-[1px_0_0_0_#334155] truncate max-w-[200px]"} title={row[h]}>{row[h]}</td>;
                                     
                                     if (isRerataMapel) return <td key={h} className={baseClass + ' font-bold text-emerald-700 dark:text-emerald-400 bg-emerald-50/40 dark:bg-emerald-900/10 text-center'}>{row[h]}</td>;
                                     if (h === 'Rerata Akhir SKL') return <td key={h} className={baseClass + ' font-black text-amber-600 dark:text-amber-400 bg-amber-50/60 dark:bg-amber-900/20 text-center text-sm sm:text-base'}>{row[h]}</td>;
                                     if (h === 'Rerata Akhir Ijazah') return <td key={h} className={baseClass + ' font-black text-blue-700 dark:text-blue-400 bg-blue-50/60 dark:bg-blue-900/10 text-center text-sm sm:text-base'}>{row[h]}</td>;
                                     
                                     if (h === 'Status Data') return <td key={h} className={baseClass + ' text-center font-bold text-xs ' + (row[h] === 'Lengkap' ? 'text-blue-600' : 'text-red-500')}>{row[h]}</td>;
                                     if (h === 'Verifikasi Siswa') return <td key={h} className={baseClass + ' text-center'}><span className={'px-2.5 py-1 rounded-md text-[11px] font-bold ' + (row[h]==='Selesai' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500')}>{row[h]==='Selesai'?'Disetujui':'Belum'}</span></td>;
                                     if (h === 'Verifikasi Wali') {
                                        const vWali = row[h] === 'Selesai';
                                        const isReady = row['Verifikasi Siswa'] === 'Selesai' && row['Status Data'] === 'Lengkap';
                                        return <td key={h} className={baseClass + ' text-center'}>
                                           {vWali ? <span className="px-3 py-1 rounded-md text-xs font-bold bg-blue-100 text-blue-700"><i className="fas fa-check-double mr-1"></i> Final</span> 
                                           : ( isReady ? <button onClick={() => { if(confirm('Validasi data '+row.NIS+'? Data akan terkunci permanen untuk siswa.')) handleVerification(row.NIS, 'VERIF_WALI') }} className="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded-md text-xs font-bold shadow-sm transition-colors animate-pulse hover:animate-none">Validasi</button>
                                           : <span className="text-xs font-semibold text-slate-400">-</span> )}
                                        </td>;
                                     }

                                     return <td key={h} className={baseClass}>{isEditable ? <EditableCell value={row[h]} isPending={isPending} pendingValue={pendingValue} isEditedByWali={waliEdits.includes(row.NIS + '_' + h)} loadingStatus={cellLoading[row.NIS + '_' + h]} isLocked={isLockedForUser} onSave={(newVal) => saveCellData(row.NIS, h, row[h], newVal)} /> : <span className="text-slate-600 dark:text-slate-300">{row[h] || '-'}</span>}</td>
                                   })}
                                   {auth.role === 'Admin' && (
                                     <td className="px-4 py-2 border-r border-slate-100 dark:border-slate-700 text-center">
                                       <button onClick={() => { if(confirm('Reset seluruh status persetujuan untuk siswa ini?')) handleVerification(row.NIS, 'RESET_ADMIN') }} title="Reset Persetujuan" className="w-8 h-8 rounded-full bg-red-50 hover:bg-red-100 text-red-500 hover:text-red-700 transition-colors focus:outline-none">
                                         <i className="fas fa-undo"></i>
                                       </button>
                                     </td>
                                   )}
                                 </tr>
                               )})}
                             </tbody>
                           </table>
                        </div>
                        {renderPaginationUI()}
                      </div>
                    )}
                  </div>
                )}

                {/* TAB: MANAJEMEN MAPEL (ADMIN ONLY) */}
                {tab === 'mapel' && auth.role === 'Admin' && (
                  <div className='p-5 sm:p-8 max-w-5xl mx-auto w-full flex-1 overflow-y-auto'>
                    <div className="mb-6 lg:mb-8 border-b border-slate-100 dark:border-slate-700 pb-4 lg:pb-6">
                      <h2 className='text-xl sm:text-2xl font-extrabold text-slate-800 dark:text-white mb-2'>Manajemen Mata Pelajaran</h2>
                      <p className='text-sm text-slate-500 dark:text-slate-400 font-medium leading-relaxed'>Atur Mapel Wajib (Masuk Ijazah). Centang <b>Toleransi Kosong</b> jika mapel tersebut boleh tidak diisi (misal: kurikulum berbeda/siswa pindahan).</p>
                    </div>
                    
                    <div className='mb-6 p-5 sm:p-6 bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-100 dark:border-indigo-800/50 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4'>
                       <div>
                         <p className="text-sm font-bold text-indigo-800 dark:text-indigo-300">1. Pindai Data Sumber</p>
                         <p className="text-xs text-indigo-600 dark:text-indigo-400 mt-1">Sistem membaca File Semester dan mendeteksi Mapel otomatis.</p>
                       </div>
                       <button onClick={handleScanMapel} disabled={loading} className="w-full sm:w-auto whitespace-nowrap bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 sm:py-3 px-5 sm:px-6 rounded-xl shadow-sm transition-colors focus:outline-none"><i className="fas fa-search mr-2"></i> Pindai Mapel</button>
                    </div>

                    {mapelConfig.length > 0 ? (
                      <div className="border border-slate-200 dark:border-slate-700 rounded-xl overflow-x-auto mb-6 shadow-sm">
                        <table className="w-full text-sm text-left whitespace-nowrap">
                          <thead className="text-xs uppercase bg-slate-100 dark:bg-slate-900 text-slate-500 dark:text-slate-400">
                            <tr>
                               <th className="px-5 py-4 border-r border-slate-200 dark:border-slate-700">Kode Asli (Spreadsheet)</th>
                               <th className="px-5 py-4 border-r border-slate-200 dark:border-slate-700">Nama Tampil di Web (Alias)</th>
                               <th className="px-5 py-4 text-center border-r border-slate-200 dark:border-slate-700" title="Masuk perhitungan Rata-Rata SKL">Masuk Rerata SKL</th>
                               <th className="px-5 py-4 text-center border-r border-slate-200 dark:border-slate-700" title="Menjadi syarat kelengkapan data">Masuk Ijazah (Wajib)</th>
                               <th className="px-5 py-4 text-center" title="Abaikan nilai kosong pada perhitungan status Lengkap">Toleransi Kosong</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50">
                            {mapelConfig.map((m, idx) => (
                              <tr key={idx} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 bg-white dark:bg-slate-800 transition-colors">
                                <td className="px-5 py-3 font-mono text-slate-600 dark:text-slate-300 border-r border-slate-100 dark:border-slate-700/50">{m.subject}</td>
                                <td className="px-4 py-2 border-r border-slate-100 dark:border-slate-700/50">
                                   <input type="text" value={m.alias || ''} onChange={(e) => handleMapelChange(idx, 'alias', e.target.value)} placeholder="Contoh: Pend. Agama" className="min-w-[180px] w-full sm:w-64 px-3 py-2 border border-slate-200 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-bold transition-all text-slate-800 dark:text-slate-100" />
                                </td>
                                <td className="px-5 py-3 text-center border-r border-slate-100 dark:border-slate-700/50"><input type="checkbox" checked={m.isSKL} onChange={() => handleMapelChange(idx, 'isSKL', null)} className="w-5 h-5 cursor-pointer checkbox-custom rounded accent-indigo-600" /></td>
                                <td className="px-5 py-3 text-center border-r border-slate-100 dark:border-slate-700/50"><input type="checkbox" checked={m.isIjazah} onChange={() => handleMapelChange(idx, 'isIjazah', null)} className="w-5 h-5 cursor-pointer checkbox-custom rounded accent-indigo-600" /></td>
                                <td className="px-5 py-3 text-center"><input type="checkbox" checked={m.isToleransi} onChange={() => handleMapelChange(idx, 'isToleransi', null)} disabled={!m.isIjazah} title={!m.isIjazah ? "Hanya berlaku untuk Mapel Wajib" : "Pilih agar nilai kosong diabaikan"} className="w-5 h-5 cursor-pointer checkbox-custom rounded accent-purple-600 disabled:opacity-30 disabled:cursor-not-allowed" /></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    ) : (
                      <div className="text-center py-12 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-dashed border-slate-300 dark:border-slate-600 mb-6"><i className="fas fa-clipboard-list text-4xl text-slate-300 dark:text-slate-600 mb-4"></i><p className="text-slate-500 font-medium">Belum ada daftar Mata Pelajaran.<br/>Silakan klik tombol Pindai di atas.</p></div>
                    )}
                    <div className='flex justify-end'><button onClick={handleSaveMapel} disabled={loading || mapelConfig.length===0} className='w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-xl shadow-sm transition-colors focus:outline-none disabled:opacity-50'><i className="fas fa-save mr-2"></i> 2. Simpan Pengaturan Mapel</button></div>
                  </div>
                )}

                {tab === 'sync' && auth.role === 'Admin' && (
                  <div className='p-5 sm:p-8 max-w-4xl mx-auto w-full flex-1 flex flex-col justify-center overflow-y-auto'>
                    <div className="text-center mb-8 sm:mb-10"><div className="inline-flex bg-purple-100 dark:bg-purple-900/30 p-4 rounded-full mb-4"><i className="fas fa-sync text-4xl text-purple-600 dark:text-purple-400"></i></div><h2 className="text-2xl font-extrabold text-slate-800 dark:text-white">Pusat Sinkronisasi</h2><p className="text-slate-500 mt-2">Pusat integrasi data nilai dari berbagai semester.</p></div>
                    <div className='mb-8 p-5 sm:p-6 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm'><label className='block text-sm font-bold mb-4 text-slate-700 dark:text-slate-300'>Opsi Dokumen Ijazah (Target Rerata)</label><div className='flex flex-col sm:flex-row gap-4 sm:gap-8'><label className='flex items-center cursor-pointer text-slate-700 dark:text-slate-200 font-medium'><input type='radio' value='5' checked={calcMode === 5} onChange={() => setCalcMode(5)} className="w-4 h-4 mr-2.5 accent-blue-600"/> Rerata Sem 1 - 5</label><label className='flex items-center cursor-pointer text-slate-700 dark:text-slate-200 font-medium'><input type='radio' value='6' checked={calcMode === 6} onChange={() => setCalcMode(6)} className="w-4 h-4 mr-2.5 accent-blue-600"/> Rerata Sem 1 - 6</label></div></div>
                    <div className='flex flex-col sm:flex-row gap-4'>
                      <button onClick={() => { setLoading(true); callApi('setupDatabase', { username: loginUser, password: loginPass }).then(r => {setLoading(false); alert(r.message);}); }} className='flex-1 bg-slate-800 hover:bg-slate-700 dark:bg-slate-700 dark:hover:bg-slate-600 text-white font-bold py-3.5 sm:py-4 rounded-xl transition-colors shadow-sm focus:outline-none'><i className="fas fa-cogs mr-2"></i> Setup Master Sheet</button>
                      <button onClick={handleSync} className='flex-1 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3.5 sm:py-4 rounded-xl transition-colors shadow-sm focus:outline-none'><i className="fas fa-cloud-download-alt mr-2"></i> Sinkronisasi Data Siswa</button>
                    </div>
                  </div>
                )}

                {tab === 'access' && auth.role === 'Admin' && (
                  <div className='p-5 sm:p-8 w-full flex-1 overflow-y-auto'><div className="mb-6 lg:mb-8 border-b border-slate-100 dark:border-slate-700 pb-4 lg:pb-6"><h2 className='text-xl sm:text-2xl font-extrabold text-slate-800 dark:text-white mb-2'>Dashboard Keamanan Rombel</h2><p className='text-sm text-slate-500 dark:text-slate-400 font-medium'>Kunci Rombel untuk mencegah Wali Kelas melakukan perubahan pada nilai yang sudah divalidasi dan final.</p></div><div className='grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6'>{rombels.length === 0 ? <div className="col-span-full text-center py-10 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-dashed border-slate-300 dark:border-slate-600 text-slate-500 italic">Belum ada data rombel. Lakukan sinkronisasi terlebih dahulu.</div> : null}{rombels.map(r => { const isLocked = lockStatus[r]; return ( <div key={r} className={"p-5 sm:p-6 border rounded-2xl text-center shadow-sm transition-all " + (isLocked ? "bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800/50" : "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700")}><div className={"text-3xl font-black mb-5 " + (isLocked ? "text-red-600 dark:text-red-400" : "text-slate-800 dark:text-slate-100")}>{r}</div><button onClick={() => handleToggleLock(r, isLocked)} className={"w-full py-2.5 sm:py-3 rounded-xl text-white font-bold text-sm sm:text-base transition-colors shadow-sm focus:outline-none " + (isLocked ? "bg-red-500 hover:bg-red-600" : "bg-emerald-500 hover:bg-emerald-600")}><i className={"fas mr-2 " + (isLocked ? "fa-lock" : "fa-unlock")}></i> {isLocked ? "Terkunci" : "Terbuka"}</button></div> )})}</div></div>
                )}

                {/* TAB: DATA INCOMPLETE (PENGGABUNGAN & REDESAIN) */}
                {tab === 'incomplete' && auth.role !== 'Siswa' && (
                   <div className='p-5 sm:p-8 flex flex-col h-full flex-1 min-h-0 bg-white dark:bg-slate-800 overflow-auto'>
                     <div className='flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4 shrink-0'>
                        <div>
                           <h2 className='text-xl sm:text-2xl font-black text-slate-800 dark:text-white flex items-center'>
                               <div className="bg-rose-100 dark:bg-rose-900/30 p-2.5 rounded-xl mr-3 shadow-sm border border-rose-200 dark:border-rose-800"><i className="fas fa-exclamation-triangle text-rose-600 dark:text-rose-400"></i></div>
                               Data Tidak Lengkap
                           </h2>
                           <p className="text-sm text-slate-500 mt-2 font-medium">Daftar siswa dengan nilai Mapel Wajib (Ijazah) yang masih kosong.</p>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                           <div className='flex items-center bg-slate-50 dark:bg-slate-900 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm'>
                             <i className="fas fa-filter text-slate-400 ml-2 mr-1"></i>
                             <select className='bg-transparent font-bold px-2 py-1 focus:outline-none text-sm text-slate-800 dark:text-slate-200 cursor-pointer min-w-[140px]' value={selectedRombel} onChange={e => setSelectedRombel(e.target.value)} disabled={auth.role === 'Wali Kelas' && auth.rombelAkses !== 'Semua'}>
                               {auth.role === 'Admin' || auth.rombelAkses === 'Semua' ? <option value="Semua">Semua Rombel</option> : null}
                               {rombels.map(r => <option key={r} value={r}>Kelas {r}</option>)}
                             </select>
                           </div>
                           <div className="relative w-full sm:w-64">
                              <i className="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                              <input type="text" placeholder="Cari NIS / Nama Siswa..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="pl-11 pr-4 py-2 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-rose-500 transition-all font-bold text-slate-700 dark:text-slate-200 shadow-sm"/>
                           </div>
                        </div>
                     </div>
                     
                     <div className='flex-1 overflow-auto border border-rose-200 dark:border-rose-900/40 rounded-2xl shadow-sm relative bg-slate-50/30 dark:bg-slate-900/10 table-container'>
                        <table className='w-full whitespace-nowrap text-sm text-left border-collapse'>
                           <thead className='text-xs uppercase bg-rose-50 dark:bg-rose-900/40 text-rose-800 dark:text-rose-300 sticky top-0 z-10 font-extrabold tracking-wider shadow-sm'>
                              <tr>
                                 <th className="px-6 py-4 border-b border-rose-100 dark:border-rose-900/50">Siswa & Rombel</th>
                                 <th className="px-6 py-4 border-b border-rose-100 dark:border-rose-900/50">Identitas</th>
                                 <th className="px-6 py-4 border-b border-rose-100 dark:border-rose-900/50">Rincian Kekurangan Data</th>
                                 <th className="px-6 py-4 border-b border-rose-100 dark:border-rose-900/50 text-center">Aksi</th>
                              </tr>
                           </thead>
                           <tbody className="divide-y divide-rose-100 dark:divide-rose-900/30">
                              {filteredIncData.length === 0 ? (
                                 <tr><td colSpan="4" className="text-center py-24 bg-white dark:bg-slate-800"><div className="flex flex-col items-center"><div className="w-20 h-20 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center mb-4 shadow-inner"><i className="fas fa-shield-check text-4xl text-emerald-500"></i></div><span className="font-extrabold text-xl text-slate-700 dark:text-slate-200">Semua Data Sudah Lengkap!</span><span className="text-slate-500 text-sm mt-2 font-medium">Tidak ada siswa dengan nilai mapel wajib yang kosong.</span></div></td></tr>
                              ) : filteredIncData.map(row => (
                                 <tr key={row.NIS} className="bg-white dark:bg-slate-800 hover:bg-rose-50/60 dark:hover:bg-rose-900/10 transition-colors group">
                                    <td className="px-6 py-5">
                                       <div className="font-extrabold text-slate-800 dark:text-slate-100 text-base group-hover:text-rose-600 dark:group-hover:text-rose-400 transition-colors">{row['Nama Lengkap']}</div>
                                       <div className="text-[11px] font-black text-slate-500 dark:text-slate-400 mt-1.5 bg-slate-100 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-700 inline-block px-2.5 py-0.5 rounded-full uppercase tracking-wide">Kelas {row.Rombel}</div>
                                    </td>
                                    <td className="px-6 py-5 font-mono text-slate-600 dark:text-slate-300 text-[13px]">
                                       <div className="flex items-center"><span className="w-10 text-[10px] text-slate-400 font-sans font-bold uppercase">NIS</span>: <span className="font-bold text-slate-700 dark:text-slate-200 ml-1">{row.NIS}</span></div>
                                       <div className="flex items-center mt-1"><span className="w-10 text-[10px] text-slate-400 font-sans font-bold uppercase">NISN</span>: <span className="font-bold text-slate-700 dark:text-slate-200 ml-1">{row.NISN}</span></div>
                                    </td>
                                    <td className="px-6 py-5">
                                       <div className="inline-flex items-start gap-2.5 bg-rose-50 dark:bg-rose-900/20 px-3.5 py-2.5 rounded-xl border border-rose-100 dark:border-rose-800/50 max-w-md whitespace-normal shadow-sm">
                                          <i className="fas fa-info-circle text-rose-500 mt-0.5"></i>
                                          <span className="text-rose-700 dark:text-rose-300 font-bold leading-relaxed text-xs">{row['Keterangan Data Kurang']}</span>
                                       </div>
                                    </td>
                                    <td className="px-6 py-5 text-center">
                                        <button onClick={() => { setTab('semester'); setSelectedRombel(row.Rombel); setSelectedStudentNIS(row.NIS); }} className="bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 dark:hover:bg-blue-900/30 dark:hover:text-blue-400 dark:hover:border-blue-800 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-xl text-xs font-bold shadow-sm transition-all focus:outline-none">
                                           <i className="fas fa-edit mr-1.5"></i> Lengkapi
                                        </button>
                                    </td>
                                 </tr>
                              ))}
                           </tbody>
                        </table>
                     </div>
                  </div>
                )}

              </div>
            </main>
          </div>
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('app'));
  </script>
</body>
</html>
